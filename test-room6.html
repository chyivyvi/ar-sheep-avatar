<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001; uiLoading: no;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- 🏠 房間群組：加入 alphaTest 與雙面渲染 -->
<a-entity id="ar-room" scale="1 1 1" position="0 0 1">
    
    <!-- 1. 前景門 (關鍵：加上 alphaTest，讓透明部分真正鏤空) -->
    <!-- <a-image id="wall-door" src="assets/door.png" 
             material="alphaTest: 0.5; side: double" 
             position="0 0.25 0" rotation="0 0 0" width="1" height="1.5"></a-image>-->

    <!-- 2. 天花板/屋頂 -->
    <a-image id="roof-left" src="assets/roof.png" material="alphaTest: 0.5; side: double" 
             position="-0.25 0.75 -0.5" rotation="-45 -90 0" width="1.1" height="0.8"></a-image>
    <a-image id="roof-right" src="assets/roof.png" material="alphaTest: 0.5; side: double" 
             position="0.25 0.75 -0.5" rotation="-45 90 0" width="1.1" height="0.8"></a-image>
    
    <!-- 3. 地板 -->
    <a-image id="floor-base" src="assets/floor.png" 
             material="alphaTest: 0.5" 
             position="0 -0.5 -0.5" rotation="-90 0 0" width="1" height="1"></a-image>
     <a-image id="floor-exterior" src="assets/outer_brick.png" material="alphaTest: 0.5" 
         position="0 -0.501 -0.5" rotation="90 0 0" width="1" height="1"></a-image>   

    <!-- 4. 左牆 -->
    <a-image id="left_wall" src="assets/left_wall.png" 
             material="alphaTest: 0.5" 
             position="-0.5 0 -0.5" rotation="0 90 0" width="1" height="1"></a-image>
    <a-image id="wall-left-exterior" src="assets/outer_brick.png" material="alphaTest: 0.5" 
         position="-0.501 0 -0.5" rotation="0 -90 0" width="1" height="1"></a-image>

    <!-- 5. 右牆 -->
    <a-image id="right_wall" src="assets/right_wall.png" 
             material="alphaTest: 0.5" 
             position="0.5 0 -0.5" rotation="0 -90 0" width="1" height="1"></a-image>
    <a-image id="wall-right-exterior" src="assets/outer_brick.png" material="alphaTest: 0.5" 
         position="0.501 0 -0.5" rotation="0 90 0" width="1" height="1"></a-image>

    <!-- 6. 背牆 -->
    <a-image id="back_wall" src="assets/back_wall.png" 
             material="alphaTest: 0.5; side: double" 
             position="0 0.25 -1" rotation="0 0 0" width="1" height="1.5"></a-image>

     <!-- 7. 家具 -->
    <a-image id="lamp" src="assets/lamp.png" 
             material="alphaTest: 0.5; side: double" 
             position="0 0.5 0.5" width="1" height="1"></a-image> 
    
</a-entity>
<!-- 🐑 小羊測試群組：原本 Z 是 -0.5，現在跟著房間往前推 1，變成 0.5 -->
            <a-entity id="sheep-group" position="0 0 0.5" scale="1 1 1">
                <a-image id="sheep-body" src="assets/sheep_body.png" position="0 0 0" width="1" height="1"></a-image>
            </a-entity>

        </a-entity>
    </a-scene>

</body>
</html>
