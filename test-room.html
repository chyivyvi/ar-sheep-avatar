<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <!-- 拿掉所有 UI，保留純 AR 場景 -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            
            <!-- 🏠 房間群組：1x1x1 的透視盒子 -->
            <a-entity id="ar-room" scale="1 1 1" position="0 0 0">
                
                <!-- 1. 前景門 (z: 0) -->
                <a-image id="wall-door" src="assets/door.png" position="0 0 0" rotation="0 0 0" width="1" height="1"></a-image>
                
                <!-- 2. 天花板 (y: 0.5) -->
                <a-image id="ceiling-base" src="assets/ceiling.png" position="0 0.5 -0.5" rotation="90 0 0" width="1" height="1"></a-image>
                
                <!-- 3. 地板 (y: -0.5) -->
                <a-image id="floor-base" src="assets/floor.png" position="0 -0.5 -0.5" rotation="-90 0 0" width="1" height="1"></a-image>

                <!-- 4. 左牆 (x: -0.5) -->
                <a-image id="wall-window" src="assets/window.png" position="-0.5 0 -0.5" rotation="0 90 0" width="1" height="1"></a-image>

                <!-- 5. 右牆 (x: 0.5) -->
                <a-image id="wall-desk" src="assets/desk.png" position="0.5 0 -0.5" rotation="0 -90 0" width="1" height="1"></a-image>

                <!-- 6. 背牆 (z: -1) -->
                <a-image id="wall-fireplace" src="assets/fireplace.png" position="0 0 -1" rotation="0 0 0" width="1" height="1"></a-image>

            </a-entity>

            <!-- 🐑 小羊測試群組：站在房間中央稍微偏下 -->
            <a-entity id="sheep-group" position="0 -0.2 -0.5" scale="0.75 0.75 0.75">
                <a-image id="sheep-body" src="assets/sheep_body.png" position="0 0 0" width="1" height="1"></a-image>
            </a-entity>

        </a-entity>
    </a-scene>

</body>
</html>
